<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ремонт техники различных брендов</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>
<body>
    <section class="brands">
        <div class="brands__header">
            <h2 class="brands__title">Ремонт техники различных брендов</h2>
        </div>

        <div class="brands__grid" id="brandsGrid">

            <a class="brand-card" href="#">
                <div class="brand-card__logo">
                    <img src="img/Lenovo.svg" alt="Lenovo">
                </div>
                <div class="brand-card__arrow">
                    <svg width="8" height="12" viewBox="0 0 8 12" fill="none">
                        <path d="M1.5 1.5L6.5 6L1.5 10.5" stroke="#e8003a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </div>
            </a>
            
            <a class="brand-card" href="#">
                <div class="brand-card__logo">
                    <img src="img/Samsung.svg" alt="Samsung">
                </div>
                <div class="brand-card__arrow">
                    <svg width="8" height="12" viewBox="0 0 8 12" fill="none">
                        <path d="M1.5 1.5L6.5 6L1.5 10.5" stroke="#e8003a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </div>
            </a>
            
            <a class="brand-card" href="#">
                <div class="brand-card__logo">
                    <img src="img/Apple.svg" alt="Apple">
                </div>
                <div class="brand-card__arrow">
                    <svg width="8" height="12" viewBox="0 0 8 12" fill="none">
                        <path d="M1.5 1.5L6.5 6L1.5 10.5" stroke="#e8003a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </div>
            </a>
            
            <a class="brand-card" href="#">
                <div class="brand-card__logo">
                    <img src="img/Bosch.svg" alt="Bosch">
                </div>
                <div class="brand-card__arrow">
                    <svg width="8" height="12" viewBox="0 0 8 12" fill="none">
                        <path d="M1.5 1.5L6.5 6L1.5 10.5" stroke="#e8003a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </div>
            </a>
            
            <a class="brand-card" href="#">
                <div class="brand-card__logo">
                    <img src="img/HP.svg" alt="HP">
                </div>
                <div class="brand-card__arrow">
                    <svg width="8" height="12" viewBox="0 0 8 12" fill="none">
                        <path d="M1.5 1.5L6.5 6L1.5 10.5" stroke="#e8003a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </div>
            </a>
            
            <a class="brand-card" href="#">
                <div class="brand-card__logo">
                    <img src="img/Acer.svg" alt="Acer">
                </div>
                <div class="brand-card__arrow">
                    <svg width="8" height="12" viewBox="0 0 8 12" fill="none">
                        <path d="M1.5 1.5L6.5 6L1.5 10.5" stroke="#e8003a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </div>
            </a>

            <a class="brand-card hide-tablet" href="#">
                <div class="brand-card__logo">
                    <img src="img/ViewSonic.svg" alt="ViewSonic">
                </div>
                <div class="brand-card__arrow">
                    <svg width="8" height="12" viewBox="0 0 8 12" fill="none">
                        <path d="M1.5 1.5L6.5 6L1.5 10.5" stroke="#e8003a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </div>
            </a>

            <a class="brand-card hide-tablet" href="#">
                <div class="brand-card__logo">
                    <img src="img/Sony.svg" alt="Sony">
                </div>
                <div class="brand-card__arrow">
                    <svg width="8" height="12" viewBox="0 0 8 12" fill="none">
                        <path d="M1.5 1.5L6.5 6L1.5 10.5" stroke="#e8003a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </div>
            </a>
            
            <!-- Скрытые карточки-дубли -->
            <a class="brand-card hidden-row" href="#">
                <div class="brand-card__logo">
                    <img src="img/Lenovo.svg" alt="Lenovo">
                </div>
                <div class="brand-card__arrow">
                    <svg width="8" height="12" viewBox="0 0 8 12" fill="none">
                        <path d="M1.5 1.5L6.5 6L1.5 10.5" stroke="#e8003a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </div>
            </a>
            <a class="brand-card hidden-row" href="#">
                <div class="brand-card__logo">
                    <img src="img/Samsung.svg" alt="Samsung">
                </div>
                <div class="brand-card__arrow">
                    <svg width="8" height="12" viewBox="0 0 8 12" fill="none">
                        <path d="M1.5 1.5L6.5 6L1.5 10.5" stroke="#e8003a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </div>
            </a>
            <a class="brand-card hidden-row" href="#">
                <div class="brand-card__logo">
                    <img src="img/Apple.svg" alt="Apple">
                </div>
                <div class="brand-card__arrow">
                    <svg width="8" height="12" viewBox="0 0 8 12" fill="none">
                        <path d="M1.5 1.5L6.5 6L1.5 10.5" stroke="#e8003a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </div>
            </a>
        </div>
        <!-- Карточки для свайпера клонируем через js -->
        <div class="brands__swiper-wrap">
            <div class="swiper" id="brandsSwiper">
                <div class="swiper-wrapper"></div>
                <div class="swiper-pagination"></div>
            </div>
        </div>

        <button class="brands__toggle" id="brandsToggle" aria-label="Показать все бренды">
            <img src="img/iconup.svg" alt="" class="brands__icon--show">
            <span class="brands__toggle-label brands__toggle-label--show">Показать все</span>
            <img src="img/icondown.svg" alt="" class="brands__icon--hide">
            <span class="brands__toggle-label brands__toggle-label--hide">Скрыть</span>
        </button>
    </section>    
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="script.js"></script>  
</body>
</html>
